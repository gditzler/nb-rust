version: 1

# Train a model from FASTA reads organized by class.
# Each subdirectory in source_dir is a class, containing genome/read files.
#
# Usage: ./nbv example/train.yaml

mode: train
kmer_size: 9
save_dir: ./example/trained_output
source_dir: ./example/training_example
threads: 4

input:
  extension: .fna
  input_type: fasta

memory:
  limit_mb: 0
  batch_size: 0
  max_rows: 0
  max_cols: 0

output:
  format: csv
  prefix: log_likelihood
  full_result: false
  temp_dir: /tmp
